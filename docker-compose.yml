version: '3.8'

services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: vedana-api:latest
    ports:
      - '3000:3000'
    restart: always

  web:
    build:
      context: ./Vedana
      dockerfile: Dockerfile
    image: vedana-web:latest
    ports:
      - '80:80'
    depends_on:
      - api
    restart: always
