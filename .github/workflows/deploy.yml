name: Lint and Deploy

on:
  push:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: api/go.sum

      - name: Lint Go API
        working-directory: ./api
        run: |
          go fmt ./...
          go vet ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Client Dependencies
        working-directory: ./client
        run: npm ci

      - name: Lint React Native Client
        working-directory: ./client
        run: npx eslint .

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH Commands on VPS
        uses: appleboy/ssh-action@v1.0.3
        env:
          API_KEY: ${{ secrets.API_KEY }}
        with:
          host: ${{ secrets.VPS_IP }}
          username: deployHelper
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: API_KEY
          script: |
            # 1. Network Diagnostics
            echo "--- Diagnostic: Testing Host DNS ---"
            getent hosts google.com || echo "Host DNS Failed"

            echo "--- Diagnostic: Testing Docker Container DNS ---"
            docker run --rm alpine nslookup bbuseruploads.s3.amazonaws.com || echo "Container DNS Failed"

            # 2. Repo Update
            if [ ! -d "$HOME/Vedana" ]; then
              git clone https://github.com/${{ github.repository }}.git "$HOME/Vedana"
            fi
            cd "$HOME/Vedana"
            git fetch origin main
            git reset --hard origin/main

            # 3. Environment Setup
            cat <<EOF > ./api/.env
            API_KEY=$API_KEY
            CLIENT_ORIGIN=http://localhost:8082
            EOF

            # 4. Build with Network Host (Workaround for DNS issues)
            echo "--- Starting Build ---"
            docker compose build --no-cache --pull
            docker compose up -d
